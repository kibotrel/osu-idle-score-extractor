<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>osu! Idle XP Export</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="viewport" class="viewport">
      <div class="view" id="view-main">
        <header>
          <h1>osu!idle Score Extractor</h1>
          <button id="btn-settings" class="btn-icon" aria-label="Settings">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
              />
              <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </button>
        </header>

        <main>
          <section id="stats-section" hidden>
            <div id="song-info" class="song-info">
              <img id="song-background" class="song-background" hidden />
              <div class="song-meta">
                <p id="song-title" class="song-title"></p>
                <div class="song-details">
                  <p id="song-version" class="song-version"></p>
                  <p id="song-duration" class="song-duration"></p>
                </div>
              </div>
            </div>

            <div id="skills-grid" class="skills-grid"></div>

            <div id="total-xp" class="total-xp" hidden>
              <span class="label">Total XP</span>
              <span id="total-value" class="value">0</span>
            </div>
          </section>

          <div class="actions">
            <button id="btn-extract" class="btn btn-primary">Extract</button>
          </div>

          <div id="copy-feedback" hidden></div>
        </main>
      </div>

      <div class="view" id="view-settings">
        <header>
          <button id="btn-back" class="btn-icon" aria-label="Back">
            <svg
              width="18"
              height="18"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12.5 15l-5-5 5-5" />
            </svg>
          </button>
          <h1>Settings</h1>
        </header>

        <main class="settings-body">
          <div id="character-card" class="character-card">
            <img id="character-avatar" class="character-avatar" hidden alt="" />
            <div id="character-avatar-placeholder" class="character-avatar-placeholder"></div>
            <div class="character-info">
              <div class="character-top-row">
                <span class="character-card__label">Character ID</span>
                <input
                  id="input-character-id"
                  class="character-id-input"
                  type="number"
                  min="1"
                  placeholder="—"
                />
              </div>
              <span id="character-name" class="character-name"></span>
            </div>
            <span id="character-global-level" class="character-global-level" hidden></span>
          </div>

          <hr class="settings-delimiter" />
          <h2 class="settings-section-title">Skills</h2>
          <div id="profile-skills" class="profile-skills"></div>
        </main>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
